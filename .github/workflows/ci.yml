name: Dotfiles CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core and ansible-lint
        run: pip install ansible-core ansible-lint

      - name: Install required Ansible collections
        run: cd ansible && ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint setup.yml

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: .bashrc .bash_profile
          ignore_paths: dotfiles/zsh dotfiles/fzf-git
          severity: warning
        env:
          SHELLCHECK_OPTS: -e SC1090 -e SC1091