---
- name: Load package variables
  ansible.builtin.include_vars: packages.yml

- name: Load tool download variables
  ansible.builtin.include_vars: tools.yml

- name: Install OS packages
  ansible.builtin.import_tasks: packages.yml

- name: Fix up renamed binaries
  ansible.builtin.import_tasks: binary_fixups.yml

- name: Install dev toolchain
  ansible.builtin.import_tasks: dev_toolchain.yml

- name: Install GitHub release binaries
  ansible.builtin.import_tasks: release_binaries.yml

- name: Install Nerd Font
  ansible.builtin.import_tasks: fonts.yml

- name: Set default shell and stow dotfiles
  ansible.builtin.import_tasks: shell_setup.yml
