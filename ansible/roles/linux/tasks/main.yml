---
- name: Load OS-specific variables
  ansible.builtin.include_vars: main.yml

- name: Update Apt Cache (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_pkg_mgr == 'apt'

- name: Install Common Packages
  become: true
  ansible.builtin.package:
    name: "{{ linux_common_packages }}"
    state: present

- name: Install Debian/Ubuntu Packages
  become: true
  ansible.builtin.apt:
    name: "{{ linux_debian_packages }}"
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: Install Arch Packages
  become: true
  community.general.pacman:
    name: "{{ linux_arch_packages }}"
    state: present
    update_cache: true
  when: ansible_pkg_mgr == 'pacman'

- name: Install Fedora Packages
  become: true
  ansible.builtin.dnf:
    name: "{{ linux_fedora_packages }}"
    state: present
    update_cache: true
  when: ansible_pkg_mgr == 'dnf'

# ========================================
# BINARY NAME FIXUPS
# ========================================

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'

- name: Check for renamed batcat binary
  ansible.builtin.stat:
    path: /usr/bin/batcat
  register: linux_batcat_bin

- name: Symlink batcat -> bat
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: "{{ ansible_env.HOME }}/.local/bin/bat"
    state: link
  when: linux_batcat_bin.stat.exists

- name: Check for renamed fdfind binary
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: linux_fdfind_bin

- name: Symlink fdfind -> fd
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: "{{ ansible_env.HOME }}/.local/bin/fd"
    state: link
  when: linux_fdfind_bin.stat.exists

# ========================================
# MANUAL INSTALLS
# ========================================

- name: Check if Oh-My-Posh is installed
  ansible.builtin.stat:
    path: /usr/local/bin/oh-my-posh
  register: linux_omp_bin

- name: Download Oh-My-Posh install script
  ansible.builtin.get_url:
    url: https://ohmyposh.dev/install.sh
    dest: /tmp/ohmyposh-install.sh
    mode: '0755'
  when: not linux_omp_bin.stat.exists

- name: Run Oh-My-Posh install script
  become: true
  ansible.builtin.command: bash /tmp/ohmyposh-install.sh -d /usr/local/bin
  when: not linux_omp_bin.stat.exists
  changed_when: true

- name: Check if rustup/cargo is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/cargo"
  register: linux_cargo_bin

- name: Download rustup install script
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-install.sh
    mode: '0755'
  when: not linux_cargo_bin.stat.exists

- name: Run rustup install script (needed for cargo-only tools below)
  ansible.builtin.command: sh /tmp/rustup-install.sh -y --default-toolchain stable
  when: not linux_cargo_bin.stat.exists
  changed_when: true

- name: Install cargo-only tools (eza, delta, rip, fcp, dust, tre, topgrade)
  ansible.builtin.command: "{{ ansible_env.HOME }}/.cargo/bin/cargo install {{ item.crate }}"
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/{{ item.bin }}"
  loop: "{{ linux_cargo_packages }}"
  loop_control:
    label: "{{ item.crate }}"

- name: Check if bat-extras is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/batman"
  register: linux_bat_extras_bin

- name: Clone bat-extras
  ansible.builtin.git:
    repo: "{{ linux_bat_extras_repo }}"
    dest: /tmp/bat-extras
    version: master
    recursive: true
  when: not linux_bat_extras_bin.stat.exists

- name: Build and install bat-extras (batman, batgrep, batdiff, etc.)
  ansible.builtin.command: ./build.sh --install --prefix={{ ansible_env.HOME }}/.local
  args:
    chdir: /tmp/bat-extras
  when: not linux_bat_extras_bin.stat.exists
  changed_when: true

- name: Attempt to install thefuck via pip (best-effort - unmaintained upstream)
  ansible.builtin.pip:
    name: thefuck
    extra_args: --user --break-system-packages
  register: linux_thefuck_install
  ignore_errors: true

- name: Warn if thefuck failed to install
  ansible.builtin.debug:
    msg: >-
      thefuck failed to install - it's an unmaintained project and often breaks
      on newer Python releases. The `fuck`/`fk` aliases in .bashrc/.zshrc will
      simply stay inactive (they're already guarded by a command -v check).
  when: linux_thefuck_install is failed

# ========================================
# GITHUB CLI
# ========================================

- name: Check if gh CLI is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/gh"
  register: linux_gh_bin

- name: Get latest gh CLI release version
  ansible.builtin.shell: >-
    python3 -c "import json,urllib.request;
    req=urllib.request.Request('https://api.github.com/repos/cli/cli/releases/latest', headers={'User-Agent': 'ansible-dotfiles'});
    print(json.load(urllib.request.urlopen(req))['tag_name'].lstrip('v'))"
  register: linux_gh_version
  changed_when: false
  when: not linux_gh_bin.stat.exists

- name: Download and unpack gh CLI
  ansible.builtin.unarchive:
    src: "https://github.com/cli/cli/releases/download/v{{ linux_gh_version.stdout }}/gh_{{ linux_gh_version.stdout }}_linux_amd64.tar.gz"
    dest: /tmp
    remote_src: true
  when: not linux_gh_bin.stat.exists

- name: Install gh binary to ~/.local/bin
  ansible.builtin.copy:
    src: "/tmp/gh_{{ linux_gh_version.stdout }}_linux_amd64/bin/gh"
    dest: "{{ ansible_env.HOME }}/.local/bin/gh"
    mode: '0755'
    remote_src: true
  when: not linux_gh_bin.stat.exists

# ========================================
# YAZI, ZELLIJ, ONEFETCH
# ========================================

- name: Check if yazi is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/yazi"
  register: linux_yazi_bin

- name: Download and unpack yazi
  ansible.builtin.unarchive:
    src: "{{ linux_yazi_url }}"
    dest: /tmp
    remote_src: true
  when: not linux_yazi_bin.stat.exists

- name: Install yazi + ya binaries to ~/.local/bin
  ansible.builtin.copy:
    src: "/tmp/yazi-x86_64-unknown-linux-gnu/{{ item }}"
    dest: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
    mode: '0755'
    remote_src: true
  loop:
    - yazi
    - ya
  when: not linux_yazi_bin.stat.exists

- name: Check if zellij is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/zellij"
  register: linux_zellij_bin

- name: Download and unpack zellij
  ansible.builtin.unarchive:
    src: "{{ linux_zellij_url }}"
    dest: "{{ ansible_env.HOME }}/.local/bin"
    remote_src: true
  when: not linux_zellij_bin.stat.exists

- name: Ensure zellij is executable
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin/zellij"
    mode: '0755'
  when: not linux_zellij_bin.stat.exists

- name: Check if onefetch is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/onefetch"
  register: linux_onefetch_bin

- name: Download and unpack onefetch
  ansible.builtin.unarchive:
    src: "{{ linux_onefetch_url }}"
    dest: "{{ ansible_env.HOME }}/.local/bin"
    remote_src: true
  when: not linux_onefetch_bin.stat.exists

- name: Ensure onefetch is executable
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin/onefetch"
    mode: '0755'
  when: not linux_onefetch_bin.stat.exists

# ========================================
# LAZYGIT
# ========================================

- name: Check if lazygit is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/lazygit"
  register: linux_lazygit_bin

- name: Get latest lazygit release version
  ansible.builtin.shell: >-
    python3 -c "import json,urllib.request;
    req=urllib.request.Request('https://api.github.com/repos/jesseduffield/lazygit/releases/latest', headers={'User-Agent': 'ansible-dotfiles'});
    print(json.load(urllib.request.urlopen(req))['tag_name'].lstrip('v'))"
  register: linux_lazygit_version
  changed_when: false
  when: not linux_lazygit_bin.stat.exists

- name: Set lazygit release asset path
  ansible.builtin.set_fact:
    linux_lazygit_path: "v{{ linux_lazygit_version.stdout }}/lazygit_{{ linux_lazygit_version.stdout }}_Linux_x86_64.tar.gz"
  when: not linux_lazygit_bin.stat.exists

- name: Set lazygit download URL
  ansible.builtin.set_fact:
    linux_lazygit_download_url: "https://github.com/jesseduffield/lazygit/releases/download/{{ linux_lazygit_path }}"
  when: not linux_lazygit_bin.stat.exists

- name: Ensure lazygit extraction directory exists
  ansible.builtin.file:
    path: /tmp/lazygit
    state: directory
    mode: '0755'
  when: not linux_lazygit_bin.stat.exists

- name: Download and unpack lazygit
  ansible.builtin.unarchive:
    src: "{{ linux_lazygit_download_url }}"
    dest: /tmp/lazygit
    remote_src: true
  when: not linux_lazygit_bin.stat.exists

- name: Install lazygit to ~/.local/bin
  ansible.builtin.copy:
    src: /tmp/lazygit/lazygit
    dest: "{{ ansible_env.HOME }}/.local/bin/lazygit"
    mode: '0755'
    remote_src: true
  when: not linux_lazygit_bin.stat.exists

# ========================================
# NERD FONT
# ========================================

- name: Check if Monaspace Nerd Font is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/share/fonts/Monaspace"
  register: linux_nerd_font_dir

- name: Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts/Monaspace"
    state: directory
    mode: '0755'
  when: not linux_nerd_font_dir.stat.exists

- name: Download and unpack Monaspace Nerd Font
  ansible.builtin.unarchive:
    src: "{{ linux_nerd_font_url }}"
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/Monaspace"
    remote_src: true
  when: not linux_nerd_font_dir.stat.exists

- name: Rebuild font cache
  ansible.builtin.command: fc-cache -f "{{ ansible_env.HOME }}/.local/share/fonts"
  when: not linux_nerd_font_dir.stat.exists
  changed_when: true

# ========================================
# DOTFILES
# ========================================

- name: Ensure .config directories exist
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'

- name: Remove default shell configs to allow symlinking
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    state: absent
  loop:
    - .bashrc
    - .bash_profile
    - .zshrc

- name: Stow all configuration packages
  ansible.builtin.command:
    cmd: "stow -v -d {{ playbook_dir }}/../dotfiles -t {{ ansible_env.HOME }} {{ item }} --no-folding"
  loop:
    - git
    - editorconfig
    - fastfetch
    - ohmyposh
    - fzf-git
    - bash
    - zsh
    - kitty
  register: linux_stow_result
  changed_when: "'LINK' in linux_stow_result.stderr"