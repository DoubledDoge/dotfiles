---
- name: Update Apt Cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['pkg_mgr'] == 'apt'

- name: Install Common Packages
  become: true
  ansible.builtin.package:
    name: "{{ linux_common_packages }}"
    state: present

- name: Install Debian/Ubuntu Packages
  become: true
  ansible.builtin.apt:
    name: "{{ linux_debian_packages }}"
    state: present
  when: ansible_facts['pkg_mgr'] == 'apt'

- name: Install Arch Packages
  become: true
  community.general.pacman:
    name: "{{ linux_arch_packages }}"
    state: present
    update_cache: true
  when: ansible_facts['pkg_mgr'] == 'pacman'

- name: Check if paru is already installed
  ansible.builtin.stat:
    path: /usr/bin/paru
  register: linux_paru_bin
  when: ansible_facts['pkg_mgr'] == 'pacman'

- name: Clone paru from the AUR
  ansible.builtin.git:
    repo: https://aur.archlinux.org/paru.git
    dest: /tmp/paru-build
  when:
    - ansible_facts['pkg_mgr'] == 'pacman'
    - linux_arch_install_paru
    - not linux_paru_bin.stat.exists

- name: Build and install paru
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /tmp/paru-build
    creates: /usr/bin/paru
  when:
    - ansible_facts['pkg_mgr'] == 'pacman'
    - linux_arch_install_paru
    - not linux_paru_bin.stat.exists

- name: Install Fedora Packages
  become: true
  ansible.builtin.dnf:
    name: "{{ linux_fedora_packages }}"
    state: present
    update_cache: true
  when: ansible_facts['pkg_mgr'] == 'dnf'

- name: Ensure en_US.UTF-8 locale is generated (Debian/Ubuntu)
  become: true
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present
  when: ansible_facts['pkg_mgr'] == 'apt'