---
- name: Check for zsh binary at its standard install path
  ansible.builtin.stat:
    path: /usr/bin/zsh
  register: linux_zsh_bin

- name: Set default shell to zsh
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: /usr/bin/zsh
  when:
    - linux_zsh_bin.stat.exists
    - ansible_facts['user_shell'] != '/usr/bin/zsh'

- name: Ensure .config directories exist
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config"
    state: directory
    mode: '0755'

- name: Remove default shell configs to allow symlinking
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}"
    state: absent
  loop:
    - .bashrc
    - .bash_profile
    - .zshenv
    - .zshrc
    - .zprofile
    - .config/zsh/.zshrc
    - .config/zsh/.zprofile

- name: Stow all configuration packages
  ansible.builtin.command:
    cmd: "stow -v -d {{ playbook_dir }}/../dotfiles -t {{ ansible_facts['user_dir'] }} {{ item }} --no-folding"
  loop:
    - git
    - editorconfig
    - fastfetch
    - ohmyposh
    - fzf-git
    - shell-common
    - bash
    - zsh
    - kitty
  register: linux_stow_result
  changed_when: "'LINK' in linux_stow_result.stderr"
